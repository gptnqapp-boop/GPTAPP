<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents</title>
<style>
body { margin:0; font-family: Arial,sans-serif; background:#f0f8ff; }

/* Header */
header {
    background:#0B3D91;
    color:white;
    padding:15px 20px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
header h1 {
    margin:0;
    font-size:1.5em;
    flex-grow:1;
    text-align:center;
}
.back-symbol {
    font-size:1.4em;
    cursor:pointer;
    margin-right:10px;
    user-select:none;
}

/* Container for cards */
.container {
    max-width:800px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
}
.button {
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    color:#0B3D91;
    padding:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s, background 0.2s;
}
.button:hover { transform:translateY(-3px); background:#e6f2ff; }

/* Fullscreen document viewer */
#docViewer {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:1000;
}
#docViewer iframe {
    width:100%;
    height:100%;
    border:none;
}
#closeDoc {
    position:absolute;
    top:10px;
    right:10px;
    background:#f44336;
    color:white;
    border:none;
    padding:15px 17px;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    z-index:1001;
}
#closeDoc:hover { background:#d32f2f; }
</style>
</head>
<body>

<header>
    <span id="backBtn" class="back-symbol" style="display:none;">←</span>
    <h1>Documents</h1>
</header>

<div class="container" id="content"></div>

<div id="docViewer">
    <button id="closeDoc">Close ✖</button>
    <iframe id="docIframe"></iframe>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClCl9tSlMfUNxBWym__WXj8FS_uBOA64M",
  authDomain: "gptapp-fa2ff.firebaseapp.com",
  projectId: "gptapp-fa2ff",
  storageBucket: "gptapp-fa2ff.firebasestorage.app",
  messagingSenderId: "834440426142",
  appId: "1:834440426142:web:e01c200e13ee25bade818f",
  measurementId: "G-GZZ28RMH36"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedTerm = null;
let selectedCourse = null;

const content = document.getElementById("content");
const backBtn = document.getElementById("backBtn");
const docViewer = document.getElementById("docViewer");
const docIframe = document.getElementById("docIframe");
const closeDoc = document.getElementById("closeDoc");

// Close document
closeDoc.onclick = () => {
    docViewer.style.display = "none";
    docIframe.src = "";
};

// Back button
backBtn.onclick = () => {
    if(selectedCourse){
        selectedCourse = null;
        loadDocuments();
    } else if(selectedTerm){
        selectedTerm = null;
        loadTerms();
    }
};

// Load all terms
function loadTerms(){
    content.innerHTML = "";
    backBtn.style.display = "none";

    db.collection("documents").get().then(snapshot=>{
        const terms = [...new Set(snapshot.docs.map(d => d.data().term))].sort((a,b)=>a-b);
        if(terms.length===0){ content.innerHTML="<p>No documents uploaded.</p>"; return; }

        terms.forEach(term=>{
            const btn = document.createElement("button");
            btn.className="button";
            btn.textContent="Term "+term;
            btn.onclick = () => { selectedTerm = term; loadDocuments(); };
            content.appendChild(btn);
        });
    });
}

// Load courses or documents
function loadDocuments(){
    content.innerHTML = "";
    backBtn.style.display = "inline-block";

    db.collection("documents")
      .where("term","==",selectedTerm)
      .get()
      .then(snapshot=>{
        if(snapshot.empty){ content.innerHTML="<p>No documents found for this term.</p>"; return; }

        if(!selectedCourse){
            // Show courses
            const courses = [...new Set(snapshot.docs.map(d=>d.data().course))].sort();
            courses.forEach(course=>{
                const btn = document.createElement("button");
                btn.className="button";
                btn.textContent=course;
                btn.onclick=()=>{ selectedCourse = course; loadDocuments(); };
                content.appendChild(btn);
            });
        } else {
            // Show documents for this course
            const docs = snapshot.docs
                .filter(d=>d.data().course===selectedCourse)
                .sort((a,b)=>{
                    const oa = a.data().order||0, ob=b.data().order||0;
                    return oa-ob;
                });

            if(docs.length===0){ content.innerHTML="<p>No documents found for this course.</p>"; return; }

            docs.forEach(d=>{
                const data = d.data();
                const btn = document.createElement("button");
                btn.className="button";
                btn.textContent = data.order ? `${data.order}. ${data.title}` : data.title;
                btn.onclick = () => openDocument(data.link);
                content.appendChild(btn);
            });
        }
    });
}

// Open document full-screen
function openDocument(link){
    docIframe.src = link;
    docViewer.style.display="block";
}

// INIT
loadTerms();
</script>

</body>
</html>
