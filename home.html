<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected HTML Hub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0B3D91, #4a90e2);
      min-height: 100vh;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    .login-box, .dashboard {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .login-box {
      max-width: 420px;
      margin: auto;
      text-align: center;
    }

    .login-box h1 {
      margin-bottom: 15px;
      font-size: 28px;
    }

    .login-box p {
      margin-bottom: 20px;
      font-size: 15px;
      opacity: 0.9;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #FFD700;
      color: #0B3D91;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ffcc00;
      transform: scale(1.02);
    }

    .error {
      color: #ffb3b3;
      margin-top: 12px;
      font-size: 14px;
    }

    .dashboard {
      display: none;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .top-bar h2 {
      font-size: 28px;
    }

    .logout-btn {
      width: auto;
      padding: 10px 18px;
      background: crimson;
      color: white;
      border-radius: 8px;
    }

    .logout-btn:hover {
      background: darkred;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.18);
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.25);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .card p {
      font-size: 14px;
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      .login-box, .dashboard {
        padding: 20px;
      }

      .top-bar h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- PASSWORD SCREEN -->
    <div class="login-box" id="loginBox">
      <h1>Protected Access</h1>
      <p>Enter the password to continue</p>

      <input type="password" id="passwordInput" placeholder="Enter password" />
      <button onclick="checkPassword()">Open</button>

      <div class="error" id="errorMsg"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
      <div class="top-bar">
        <h2>Protected HTML Hub</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div class="grid">
        <a href="page1.html" class="card">
          <h3>Page 1</h3>
          <p>Open first protected page</p>
        </a>

        <a href="page2.html" class="card">
          <h3>Page 2</h3>
          <p>Open second protected page</p>
        </a>

        <a href="page3.html" class="card">
          <h3>Page 3</h3>
          <p>Open third protected page</p>
        </a>

        <a href="page4.html" class="card">
          <h3>Page 4</h3>
          <p>Open fourth protected page</p>
        </a>
      </div>
    </div>

  </div>

  <script>
    const correctPassword = "Felix26!"; // CHANGE THIS PASSWORD

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const errorMsg = document.getElementById("errorMsg");

      if (input === correctPassword) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        errorMsg.textContent = "";

        // Save login state
        localStorage.setItem("protectedAccess", "true");
      } else {
        errorMsg.textContent = "Wrong password. Try again.";
      }
    }

    function logout() {
      localStorage.removeItem("protectedAccess");
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("passwordInput").value = "";
    }

    // Keep user logged in if already entered password before
    window.onload = function () {
      if (localStorage.getItem("protectedAccess") === "true") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
      }
    };

    // Press Enter to submit password
    document.getElementById("passwordInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });
  </script>

</body>
</html>
